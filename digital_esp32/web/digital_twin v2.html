<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>数字孪生 - ESP32实时监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial; 
      background: #1a1a2e; 
      color: #fff;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 { color: #0ff; font-size: 28px; }
    .header .status { color: #0f0; margin-top: 5px; }
    .header .status.error { color: #f00; }
    
    .cards {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px 40px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      min-width: 200px;
    }
    .card .label { font-size: 14px; color: #aaa; }
    .card .value { font-size: 48px; font-weight: bold; margin: 10px 0; }
    .card .unit { font-size: 16px; color: #aaa; }
    .card.temp .value { color: #ff6b6b; }
    .card.humi .value { color: #4ecdc4; }
    
    .charts-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #tempChart, #humiChart {
      width: 100%;
      height: 350px;
    }
    
    .info {
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- 标题 -->
  <div class="header">
    <h1>🌡️ ESP32 数字孪生监控系统</h1>
    <p class="status" id="status">连接中...</p>
  </div>

  <!-- 实时数值卡片 -->
  <div class="cards">
    <div class="card temp">
      <div class="label">温度</div>
      <div class="value" id="tempValue">--</div>
      <div class="unit">°C</div>
    </div>
    <div class="card humi">
      <div class="label">湿度</div>
      <div class="value" id="humiValue">--</div>
      <div class="unit">%</div>
    </div>
  </div>

  <!-- 图表 -->
  <div class="charts-container">
    <div class="chart-box">
      <div id="tempChart"></div>
    </div>
    <div class="chart-box">
      <div id="humiChart"></div>
    </div>
  </div>

  <div class="info">
    <p>消息数：<span id="msgCount">0</span> | 最后更新：<span id="lastTime">--</span></p>
  </div>

  <!-- 引入 ECharts 和 MQTT.js -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.0.0/dist/mqtt.min.js"></script>

  <script>
    // ==================== 配置 ====================
    const MAX_DATA_POINTS = 50;  // 最多显示50个数据点

    // 存储历史数据
    let tempData = [];
    let humiData = [];
    let timeData = [];
    let msgCount = 0;

    // ==================== ECharts 初始化 ====================
    
    // 温度图表
    const tempChart = echarts.init(document.getElementById('tempChart'));
    const tempOption = {
      title: { 
        text: '温度变化曲线', 
        textStyle: { color: '#ff6b6b', fontSize: 16 },
        left: 'center'
      },
      tooltip: { 
        trigger: 'axis',
        formatter: '{b}<br/>温度: {c} °C'
      },
      grid: { left: '10%', right: '5%', top: '15%', bottom: '15%' },
      xAxis: { 
        type: 'category', 
        data: [],
        axisLabel: { color: '#999', rotate: 30 },
        axisLine: { lineStyle: { color: '#444' } }
      },
      yAxis: { 
        type: 'value', 
        name: '°C',
        nameTextStyle: { color: '#999' },
        axisLabel: { color: '#999' },
        axisLine: { lineStyle: { color: '#444' } },
        splitLine: { lineStyle: { color: '#333' } }
      },
      series: [{
        name: '温度',
        type: 'line',
        data: [],
        smooth: true,
        symbol: 'circle',
        symbolSize: 8,
        lineStyle: { color: '#ff6b6b', width: 3 },
        itemStyle: { color: '#ff6b6b' },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(255,107,107,0.5)' },
            { offset: 1, color: 'rgba(255,107,107,0)' }
          ])
        },
        markLine: {
          data: [
            { yAxis: 35, name: '高温预警', lineStyle: { color: '#f00', type: 'dashed' } }
          ],
          label: { formatter: '预警: {c}°C' }
        }
      }]
    };
    tempChart.setOption(tempOption);

    // 湿度图表
    const humiChart = echarts.init(document.getElementById('humiChart'));
    const humiOption = {
      title: { 
        text: '湿度变化曲线', 
        textStyle: { color: '#4ecdc4', fontSize: 16 },
        left: 'center'
      },
      tooltip: { 
        trigger: 'axis',
        formatter: '{b}<br/>湿度: {c} %'
      },
      grid: { left: '10%', right: '5%', top: '15%', bottom: '15%' },
      xAxis: { 
        type: 'category', 
        data: [],
        axisLabel: { color: '#999', rotate: 30 },
        axisLine: { lineStyle: { color: '#444' } }
      },
      yAxis: { 
        type: 'value', 
        name: '%',
        min: 0,
        max: 100,
        nameTextStyle: { color: '#999' },
        axisLabel: { color: '#999' },
        axisLine: { lineStyle: { color: '#444' } },
        splitLine: { lineStyle: { color: '#333' } }
      },
      series: [{
        name: '湿度',
        type: 'line',
        data: [],
        smooth: true,
        symbol: 'circle',
        symbolSize: 8,
        lineStyle: { color: '#4ecdc4', width: 3 },
        itemStyle: { color: '#4ecdc4' },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(78,205,196,0.5)' },
            { offset: 1, color: 'rgba(78,205,196,0)' }
          ])
        }
      }]
    };
    humiChart.setOption(humiOption);

    // 窗口大小改变时，图表自动调整
    window.addEventListener('resize', () => {
      tempChart.resize();
      humiChart.resize();
    });

    // ==================== MQTT 连接 ====================
    
    const brokerUrl = 'wss://pf1c3cae.ala.cn-shenzhen.emqxsl.cn:8084/mqtt';
    
    const options = {
      clientId: 'web-' + Math.random().toString(16).substr(2, 8),
      username: '123',
      password: '12345678',
      clean: true,
      connectTimeout: 10000,
      reconnectPeriod: 3000
    };

    console.log('正在连接MQTT...');
    const client = mqtt.connect(brokerUrl, options);

    // 连接成功
    client.on('connect', () => {
      console.log('MQTT连接成功！');
      document.getElementById('status').textContent = '✅ 已连接';
      document.getElementById('status').className = 'status';
      client.subscribe('esp32');
    });

    // 连接错误
    client.on('error', (err) => {
      console.error('MQTT错误:', err);
      document.getElementById('status').textContent = '❌ 连接失败';
      document.getElementById('status').className = 'status error';
    });

    // 断开连接
    client.on('close', () => {
      document.getElementById('status').textContent = '⚠️ 已断开，重连中...';
      document.getElementById('status').className = 'status error';
    });

    // ==================== 接收消息并更新图表 ====================
    
    client.on('message', (topic, message) => {
      try {
        const data = JSON.parse(message.toString());
        console.log('收到数据:', data);
        
        // 更新计数
        msgCount++;
        document.getElementById('msgCount').textContent = msgCount;
        
        // 获取当前时间
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                        now.getMinutes().toString().padStart(2, '0') + ':' + 
                        now.getSeconds().toString().padStart(2, '0');
        
        // 更新最后时间
        document.getElementById('lastTime').textContent = timeStr;
        
        // 更新实时数值
        document.getElementById('tempValue').textContent = data.temp.toFixed(1);
        document.getElementById('humiValue').textContent = data.humi.toFixed(1);
        
        // 添加数据到数组
        timeData.push(timeStr);
        tempData.push(data.temp);
        humiData.push(data.humi);
        
        // 只保留最近的数据点
        if (timeData.length > MAX_DATA_POINTS) {
          timeData.shift();
          tempData.shift();
          humiData.shift();
        }
        
        // 更新温度图表
        tempChart.setOption({
          xAxis: { data: timeData },
          series: [{ data: tempData }]
        });
        
        // 更新湿度图表
        humiChart.setOption({
          xAxis: { data: timeData },
          series: [{ data: humiData }]
        });
        
      } catch (e) {
        console.error('解析消息失败:', e);
      }
    });

  </script>
</body>
</html>
