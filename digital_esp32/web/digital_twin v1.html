<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>ESP32实时监控</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; background: #000; }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: #0f0;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #0f0;
      min-width: 200px;
    }
    #info h2 { margin: 0 0 15px 0; color: #0ff; font-size: 20px; }
    #info p { margin: 8px 0; font-size: 16px; }
    .value { color: #ff0; font-weight: bold; font-size: 20px; }
    #status { color: #0f0; }
    #status.error { color: #f00; }
  </style>
</head>
<body>

<!-- 数据显示面板 -->
<div id="info">
  <h2>🌡️ 数字孪生监控</h2>
  <p>温度：<span class="value" id="temp">--</span> °C</p>
  <p>湿度：<span class="value" id="humi">--</span> %</p>
  <hr style="border-color: #0f0;">
  <p>状态：<span id="status">连接中...</span></p>
  <p>消息数：<span class="value" id="count">0</span></p>
</div>

<!-- 引入 Three.js 和 MQTT.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mqtt@5.0.0/dist/mqtt.min.js"></script>

<script>
// ==================== Three.js 3D场景 ====================

// 创建场景
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

// 创建相机
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 4;

// 创建渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 创建立方体（代表ESP32设备）
const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
const material = new THREE.MeshPhongMaterial({ 
  color: 0x00ff00,
  shininess: 100 
});
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// 添加灯光
const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(5, 5, 5);
scene.add(directionalLight);

const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

// 添加坐标轴辅助（可选）
const axesHelper = new THREE.AxesHelper(3);
scene.add(axesHelper);

// 动画循环
let rotationSpeed = 0.01;
let msgCount = 0;

function animate() {
  requestAnimationFrame(animate);
  cube.rotation.x += rotationSpeed;
  cube.rotation.y += rotationSpeed;
  renderer.render(scene, camera);
}
animate();

// 窗口大小改变时调整
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ==================== MQTT连接 ====================

// EMQX Cloud WebSocket连接地址
const brokerUrl = 'wss://pf1c3cae.ala.cn-shenzhen.emqxsl.cn:8084/mqtt';

const options = {
  clientId: 'web-' + Math.random().toString(16).substr(2, 8),
  username: '123',
  password: '12345678',
  clean: true,
  connectTimeout: 10000,
  reconnectPeriod: 3000
};

console.log('正在连接MQTT...');
const client = mqtt.connect(brokerUrl, options);

// 连接成功
client.on('connect', () => {
  console.log('MQTT连接成功！');
  document.getElementById('status').textContent = '已连接 ✅';
  document.getElementById('status').className = '';
  client.subscribe('esp32');
  console.log('已订阅 esp32 主题');
});

// 连接错误
client.on('error', (err) => {
  console.error('MQTT错误:', err);
  document.getElementById('status').textContent = '连接失败 ❌';
  document.getElementById('status').className = 'error';
});

// 断开连接
client.on('close', () => {
  document.getElementById('status').textContent = '已断开，重连中...';
  document.getElementById('status').className = 'error';
});

// 接收消息
client.on('message', (topic, message) => {
  try {
    const data = JSON.parse(message.toString());
    console.log('收到数据:', data);
    
    // 更新计数
    msgCount++;
    document.getElementById('count').textContent = msgCount;
    
    // 更新显示面板
    document.getElementById('temp').textContent = data.temp.toFixed(1);
    document.getElementById('humi').textContent = data.humi.toFixed(1);
    
    // ========== 数据驱动3D模型 ==========
    
    // 温度控制颜色（冷→蓝，热→红）
    // 假设温度范围：0°C ~ 50°C
    const tempNormalized = Math.max(0, Math.min(1, (data.temp - 0) / 50));
    const hue = (1 - tempNormalized) * 0.7;  // 0.7=蓝色，0=红色
    cube.material.color.setHSL(hue, 1, 0.5);
    
    // 湿度控制旋转速度
    rotationSpeed = 0.005 + (data.humi / 100) * 0.03;
    
    // 湿度控制缩放
    const scale = 0.8 + (data.humi / 100) * 0.8;
    cube.scale.set(scale, scale, scale);
    
  } catch (e) {
    console.error('解析消息失败:', e);
  }
});

</script>
</body>
</html>
